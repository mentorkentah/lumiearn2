<!DOCTYPE html>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
html, body{margin:0;padding:0;height:100%;}
body{
  font-family:'Orbitron', sans-serif;
  background:#0a0a0f;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
.register-card{
  background:#111118;
  max-width:520px;
  width:100%;
  border-radius:16px;
  padding:34px 30px;
  box-shadow:0 0 20px rgba(0,255,240,0.25);
}
.brand-logo{
width:300px;
display:block;
margin:auto;
}
.btn{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#00fff0;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="register-card">

<div class="brand">
<img src="logo.png" class="brand-logo">
<h2>LUMIEARN Register</h2>
</div>

<form id="registerForm">

<input type="text" id="usernameInput" placeholder="Username" required><br><br>
<input type="email" id="emailInput" placeholder="Email" required><br><br>
<input type="tel" id="phoneInput" placeholder="Phone" required><br><br>

<input type="text" id="invitedBy" readonly><br><br>

<input type="password" id="passwordInput" placeholder="Password" required><br><br>
<input type="password" id="confirmPasswordInput" placeholder="Confirm Password" required><br><br>

<button class="btn">Create Account</button>

</form>

</div>

<script>

/* COUNTRY DATA */
const countries = [
{ name:"Kenya", currency:"KSH", capitalFee:300, startingProfit:100 },
{ name:"Uganda", currency:"UGX", capitalFee:18500, startingProfit:4000 },
{ name:"Tanzania", currency:"TZS", capitalFee:14000, startingProfit:2500 },
{ name:"United States", currency:"USD", capitalFee:8, startingProfit:2 }
];

/* REFERRAL CODE */
const urlParams = new URLSearchParams(window.location.search);
const ref = urlParams.get('ref');

const invitedByInput = document.getElementById("invitedBy");

if(ref){
localStorage.setItem("REFERRAL_CODE", ref.toUpperCase());
invitedByInput.value = ref.toUpperCase();
}else{
const savedRef = localStorage.getItem("REFERRAL_CODE");
invitedByInput.value = savedRef || "LUMIEARN";
}

/* REGISTER USER */

document.getElementById("registerForm").addEventListener("submit", e=>{
e.preventDefault();

const username = document.getElementById("usernameInput").value.trim();
const email = document.getElementById("emailInput").value.trim();
const phone = document.getElementById("phoneInput").value.trim();
const password = document.getElementById("passwordInput").value;
const confirm = document.getElementById("confirmPasswordInput").value;

if(password !== confirm){
alert("Passwords do not match");
return;
}

const selectedCountry = countries[0];

const storageKey = "LUMIEARN_USER_" + username.toLowerCase();

const newUser = {

username: username,
email: email,
phone: phone,
password: password,

country: selectedCountry.name,
currency: selectedCountry.currency,

capitalFee: selectedCountry.capitalFee,
startingProfit: selectedCountry.startingProfit,

/* MLM DISABLED UNTIL DASHBOARD */
mlmRewards: null,
mlmActivated: false,

referredBy: invitedByInput.value,

referralBonus: 0,
balance: selectedCountry.startingProfit,
profit: selectedCountry.startingProfit,

paid: false,

registeredAt: new Date().toISOString()

};

localStorage.setItem(storageKey, JSON.stringify(newUser));

alert("Account created successfully");

window.location.href="login.php";

});

</script>

</body>
</html>
